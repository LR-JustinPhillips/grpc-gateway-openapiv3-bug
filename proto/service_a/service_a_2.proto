syntax = "proto3";
package service.a.v1;

import "google/api/annotations.proto";
import "shared.proto";

// Service A2.
service ServiceA2 {
    // Returns "hello" (probably).
    rpc Hello(StringMessage) returns (StringMessage) {
        option (google.api.http) = {
            post: "/service-a/2/hello"
            body: "*"
        };
    }
}